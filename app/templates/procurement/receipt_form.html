{% extends "base.html" %}
{% block title %}{{ '新增收货' if not row else '编辑收货' }} - 工厂订单系统{% endblock %}
{% block content %}
<h2 class="mb-4">{{ '新增收货' if not row else '编辑收货' }}</h2>
<form method="post" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">经营主体</label>
        <select name="company_id" class="form-select" required>
            {% for c in companies %}
            <option value="{{ c.id }}" {% if row and row.company_id == c.id %}selected{% elif not row and companies and companies[0].id == c.id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-8">
        <label class="form-label">采购单</label>
        <select name="purchase_order_id" class="form-select" required>
            <option value="">请选择</option>
            {% for po in orders %}
            <option value="{{ po.id }}" {% if row and row.purchase_order_id == po.id %}selected{% endif %}>{{ po.po_no }} / {{ po.supplier_name }} / {{ po.item_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-3">
        <label class="form-label">收货数量</label>
        <input type="number" step="0.01" min="0.01" class="form-control" name="received_qty" value="{{ row.received_qty if row else '' }}" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">收货时间</label>
        <input type="datetime-local" class="form-control" name="received_at" value="{{ row.received_at.strftime('%Y-%m-%dT%H:%M') if row and row.received_at else '' }}" required>
    </div>
    <div class="col-md-3">
        <label class="form-label">状态</label>
        <select name="status" class="form-select">
            {% for s in receipt_statuses %}
            <option value="{{ s }}" {% if (row and row.status == s) or (not row and s == 'draft') %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-2">
        <label class="form-label">入库库区</label>
        <input type="text" class="form-control" name="storage_area" maxlength="64" placeholder="仅过账时生效">
    </div>
    <div class="col-12">
        <label class="form-label">备注</label>
        <textarea name="remark" rows="3" class="form-control" maxlength="500">{{ row.remark if row else '' }}</textarea>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('main.procurement_receipt_list', company_id=row.company_id if row else None) }}" class="btn btn-secondary">返回</a>
    </div>
</form>
{% endblock %}
