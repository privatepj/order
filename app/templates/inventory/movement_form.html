{% extends "base.html" %}
{% block title %}库存录入 - 工厂订单系统{% endblock %}
{% block extra_css %}
<style>
.mov-line-table .inv-product-cell { position: relative; min-width: 200px; max-width: 320px; }
.inv-product-dd {
    position: fixed; z-index: 1050; max-height: 240px; overflow-y: auto;
    background: #fff; border: 1px solid #dee2e6; border-radius: 0.25rem;
    box-shadow: 0 0.5rem 1rem rgba(0,0,0,.1);
}
.inv-product-dd .list-group-item { cursor: pointer; padding: 0.35rem 0.5rem; font-size: 0.875rem;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.inv-product-dd .list-group-item:hover { background: #f8f9fa; }
</style>
{% endblock %}
{% block content %}
<div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <h2 class="mb-0">库存录入</h2>
    <button type="button" class="btn btn-outline-primary btn-sm" id="btnAddLine">新增录入</button>
</div>
<form method="post" id="movForm"
    data-products-search-url="{{ url_for('main.inventory_products_search') }}"
    data-suggest-area-url="{{ url_for('main.inventory_suggest_storage_area') }}">
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">类别 <span class="text-danger">*</span></label>
            <select name="category" id="invCategory" class="form-select" required>
                <option value="finished" selected>成品</option>
                <option value="semi">半成品（暂未开通）</option>
            </select>
            <div class="form-text text-warning d-none" id="semiHint">物料表未接入，无法保存半成品流水。</div>
        </div>
        <div class="col-md-4">
            <label class="form-label">方向 <span class="text-danger">*</span></label>
            <select name="direction" class="form-select" required>
                <option value="in">入库</option>
                <option value="out">出库</option>
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">业务日期 <span class="text-danger">*</span></label>
            <input type="date" class="form-control" name="biz_date" required value="{{ default_biz_date }}">
        </div>
    </div>
    <p class="text-muted small">每行选择产品后自动带出规格、单位；若该产品在库存中已有记录，将尝试带出仓储区（可改）。</p>
    <div class="table-responsive app-table-scroll mov-line-table">
    <table class="table table-bordered align-middle" id="movLinesTable">
        <thead>
            <tr>
                <th style="min-width:220px;">品名（搜索） <span class="text-danger">*</span></th>
                <th style="min-width:100px;">规格（自动）</th>
                <th style="min-width:80px;">单位</th>
                <th style="min-width:90px;">仓储区 <span class="text-danger">*</span></th>
                <th style="min-width:90px;">数量 <span class="text-danger">*</span></th>
                <th>备注</th>
                <th style="width:72px;"></th>
            </tr>
        </thead>
        <tbody id="movLinesBody">
            <tr class="mov-line-row">
                <td class="inv-product-cell">
                    <input type="hidden" name="line_product_id" class="inv-line-product-id" value="">
                    <input type="text" class="form-control form-control-sm inv-line-product-search" autocomplete="off" placeholder="关键字搜索…">
                    <div class="inv-product-dd list-group d-none"></div>
                </td>
                <td><input type="text" class="form-control form-control-sm inv-line-spec" readonly placeholder="选产品后显示"></td>
                <td><input type="text" class="form-control form-control-sm" name="line_unit" maxlength="16" placeholder="默认单位"></td>
                <td><input type="text" class="form-control form-control-sm" name="line_storage_area" maxlength="32" placeholder="如 B18"></td>
                <td><input type="text" class="form-control form-control-sm" name="line_quantity" inputmode="decimal" placeholder="&gt;0"></td>
                <td><input type="text" class="form-control form-control-sm" name="line_remark" maxlength="255"></td>
                <td><button type="button" class="btn btn-sm btn-outline-danger btn-mov-remove" title="删除本行">删</button></td>
            </tr>
        </tbody>
    </table>
    </div>
    <div class="mt-3">
        <button type="submit" class="btn btn-primary" id="btnSubmit">保存</button>
        <a href="{{ url_for('main.inventory_list') }}" class="btn btn-outline-secondary">返回</a>
    </div>
</form>

<template id="movLineTpl">
    <tr class="mov-line-row">
        <td class="inv-product-cell">
            <input type="hidden" name="line_product_id" class="inv-line-product-id" value="">
            <input type="text" class="form-control form-control-sm inv-line-product-search" autocomplete="off" placeholder="关键字搜索…">
            <div class="inv-product-dd list-group d-none"></div>
        </td>
        <td><input type="text" class="form-control form-control-sm inv-line-spec" readonly placeholder="选产品后显示"></td>
        <td><input type="text" class="form-control form-control-sm" name="line_unit" maxlength="16" placeholder="默认单位"></td>
        <td><input type="text" class="form-control form-control-sm" name="line_storage_area" maxlength="32" placeholder="如 B18"></td>
        <td><input type="text" class="form-control form-control-sm" name="line_quantity" inputmode="decimal" placeholder="&gt;0"></td>
        <td><input type="text" class="form-control form-control-sm" name="line_remark" maxlength="255"></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger btn-mov-remove" title="删除本行">删</button></td>
    </tr>
</template>
{% endblock %}
{% block extra_js %}
<script>
(function () {
    var form = document.getElementById('movForm');
    var searchUrl = form.getAttribute('data-products-search-url');
    var suggestUrl = form.getAttribute('data-suggest-area-url');
    var body = document.getElementById('movLinesBody');
    var tpl = document.getElementById('movLineTpl');
    var categorySel = document.getElementById('invCategory');
    var semiHint = document.getElementById('semiHint');
    var btnSubmit = document.getElementById('btnSubmit');
    var debounceByInput = new WeakMap();

    function hideAllDd() {
        document.querySelectorAll('.inv-product-dd').forEach(function (el) {
            el.classList.add('d-none');
            el.innerHTML = '';
        });
    }

    function placeDropdown(dd, anchor) {
        var rect = anchor.getBoundingClientRect();
        dd.style.cssText = 'position:fixed;z-index:1050;left:' + rect.left + 'px;width:' + Math.max(rect.width, 200) + 'px;top:' + rect.bottom + 'px;max-height:240px;overflow:auto';
    }

    function renderDd(dd, items, anchor) {
        dd.innerHTML = '';
        placeDropdown(dd, anchor);
        if (!items || !items.length) {
            var empty = document.createElement('div');
            empty.className = 'list-group-item text-muted';
            empty.textContent = '无匹配项';
            dd.appendChild(empty);
            dd.classList.remove('d-none');
            return;
        }
        items.forEach(function (it) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'list-group-item list-group-item-action';
            btn.textContent = it.label || '';
            btn.addEventListener('mousedown', function (e) { e.preventDefault(); });
            btn.addEventListener('click', function () {
                var row = dd.closest('.mov-line-row');
                if (!row) return;
                row.querySelector('.inv-line-product-id').value = String(it.id);
                row.querySelector('.inv-line-product-search').value = it.label || '';
                row.querySelector('.inv-line-spec').value = it.spec || '';
                var u = row.querySelector('[name="line_unit"]');
                if (u && !u.value) u.value = it.base_unit || '';
                hideAllDd();
                if (suggestUrl && it.id) {
                    fetch(suggestUrl + '?product_id=' + encodeURIComponent(String(it.id)), {
                        credentials: 'same-origin',
                        headers: { 'Accept': 'application/json' }
                    })
                        .then(function (r) { return r.json(); })
                        .then(function (data) {
                            var sa = row.querySelector('[name="line_storage_area"]');
                            if (sa && data && data.storage_area && !sa.value) {
                                sa.value = data.storage_area;
                            }
                        })
                        .catch(function () {});
                }
            });
            dd.appendChild(btn);
        });
        dd.classList.remove('d-none');
    }

    function fetchProducts(q, row, dd) {
        if (!searchUrl || categorySel.value !== 'finished') return;
        var url = searchUrl + '?q=' + encodeURIComponent(q || '') + '&limit=50';
        var anchor = row.querySelector('.inv-line-product-search');
        fetch(url, { credentials: 'same-origin', headers: { 'Accept': 'application/json' } })
            .then(function (r) { return r.json(); })
            .then(function (data) { renderDd(dd, data.items || [], anchor); })
            .catch(function () { renderDd(dd, [], anchor); });
    }

    function bindRow(row) {
        var search = row.querySelector('.inv-line-product-search');
        var hid = row.querySelector('.inv-line-product-id');
        var dd = row.querySelector('.inv-product-dd');
        if (!search || !dd) return;

        search.addEventListener('input', function () {
            hid.value = '';
            row.querySelector('.inv-line-spec').value = '';
            var t = debounceByInput.get(search);
            if (t) clearTimeout(t);
            t = setTimeout(function () { fetchProducts(search.value.trim(), row, dd); }, 250);
            debounceByInput.set(search, t);
        });
        search.addEventListener('focus', function () {
            if (categorySel.value === 'finished') fetchProducts(search.value.trim(), row, dd);
        });
    }

    function bindAllRows() {
        body.querySelectorAll('.mov-line-row').forEach(bindRow);
    }

    document.getElementById('btnAddLine').addEventListener('click', function () {
        body.appendChild(tpl.content.cloneNode(true));
        var rows = body.querySelectorAll('.mov-line-row');
        bindRow(rows[rows.length - 1]);
    });

    body.addEventListener('click', function (e) {
        if (e.target.classList.contains('btn-mov-remove')) {
            var rows = body.querySelectorAll('.mov-line-row');
            if (rows.length <= 1) return;
            e.target.closest('tr').remove();
        }
    });

    document.addEventListener('click', function (e) {
        if (!e.target.closest('.inv-product-cell')) hideAllDd();
    });

    categorySel.addEventListener('change', function () {
        var semi = categorySel.value === 'semi';
        semiHint.classList.toggle('d-none', !semi);
        btnSubmit.disabled = semi;
        body.querySelectorAll('.inv-line-product-search').forEach(function (inp) {
            inp.disabled = semi;
        });
    });

    form.addEventListener('submit', function (e) {
        if (categorySel.value === 'semi') {
            e.preventDefault();
            return;
        }
        var ok = false;
        body.querySelectorAll('.mov-line-row').forEach(function (tr) {
            var pid = tr.querySelector('.inv-line-product-id');
            var qty = tr.querySelector('[name="line_quantity"]');
            var sa = tr.querySelector('[name="line_storage_area"]');
            if (pid && pid.value && qty && String(qty.value).trim() !== '' &&
                sa && String(sa.value).trim() !== '') {
                ok = true;
            }
        });
        if (!ok) {
            e.preventDefault();
            alert('请至少填写一行：产品、仓储区与数量。');
        }
    });

    bindAllRows();
})();
</script>
{% endblock %}
