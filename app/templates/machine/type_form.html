{% extends "base.html" %}
{% block title %}{{ '编辑' if row else '新建' }}机台种类 - 工厂订单系统{% endblock %}
{% block content %}
<h2 class="mb-4">{{ '编辑' if row else '新建' }}机台种类</h2>

<form method="post" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">种类编码 <span class="text-danger">*</span></label>
        <input class="form-control" name="code" maxlength="32" required value="{{ row.code if row else '' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">种类名称 <span class="text-danger">*</span></label>
        <input class="form-control" name="name" maxlength="64" required value="{{ row.name if row else '' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">启用状态</label>
        <select class="form-select" name="is_active">
            <option value="1" {% if not row or row.is_active %}selected{% endif %}>启用</option>
            <option value="0" {% if row and not row.is_active %}selected{% endif %}>停用</option>
        </select>
    </div>
    <div class="col-md-8">
        <label class="form-label">默认能力工位（对应 hr_department.id）</label>
        <select name="default_capability_hr_department_id" class="form-select">
            <option value="0" {% if not row or not row.default_capability_hr_department_id %}selected{% endif %}>未配置（白名单工位填 0 时仍可能跨工种择优品率）</option>
            {% for d in hr_departments %}
            <option value="{{ d.id }}" {% if row and row.default_capability_hr_department_id == d.id %}selected{% endif %}>{{ d.name }}（id={{ d.id }}）</option>
            {% endfor %}
        </select>
        <div class="form-text">该机种下各机台预算选人时，白名单「能力工位」为 0 则优先用此工种与能力表对齐。</div>
    </div>
    <div class="col-12">
        <label class="form-label">备注</label>
        <input class="form-control" name="remark" maxlength="255" value="{{ row.remark if row else '' }}">
    </div>
    <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('main.machine_type_list') }}" class="btn btn-outline-secondary">返回</a>
    </div>
</form>
{% endblock %}
