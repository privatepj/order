{% extends "base.html" %}
{% block title %}编辑菜单项 - 工厂订单系统{% endblock %}
{% block content %}
<h2 class="mb-4">编辑菜单项</h2>
<p><code>{{ row.code }}</code> {% if row.endpoint %}· {{ row.endpoint }}{% endif %}</p>
<form method="post">
    <div class="mb-3">
        <label class="form-label">标题</label>
        <input class="form-control" name="title" required maxlength="128" value="{{ row.title }}">
    </div>
    <div class="mb-3">
        <label class="form-label">排序</label>
        <input class="form-control" type="number" name="sort_order" value="{{ row.sort_order }}">
    </div>
    <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" name="is_active" value="1" id="na" {% if row.is_active %}checked{% endif %}>
        <label class="form-check-label" for="na">启用</label>
    </div>
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="admin_only" value="1" id="adm" {% if row.admin_only %}checked{% endif %}>
        <label class="form-check-label" for="adm">仅管理员角色可分配</label>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{{ url_for('main.sys_nav_list') }}" class="btn btn-link">返回</a>
</form>
{% endblock %}
