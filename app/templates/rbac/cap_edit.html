{% extends "base.html" %}
{% block title %}编辑能力 - 工厂订单系统{% endblock %}
{% block content %}
<h2 class="mb-4">编辑能力项</h2>
<p><code>{{ row.code }}</code></p>
<form method="post">
    <div class="mb-3">
        <label class="form-label">标题</label>
        <input class="form-control" name="title" required maxlength="255" value="{{ row.title }}">
    </div>
    <div class="mb-3">
        <label class="form-label">分组标签</label>
        <input class="form-control" name="group_label" maxlength="128" value="{{ row.group_label or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">归属菜单（叶子 code）</label>
        <select name="nav_item_code" class="form-select">
            {% for n in nav_leaves %}
            <option value="{{ n.code }}" {% if n.code == row.nav_item_code %}selected{% endif %}>{{ n.code }} — {{ n.title }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">排序</label>
        <input class="form-control" type="number" name="sort_order" value="{{ row.sort_order }}">
    </div>
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="is_active" value="1" id="ca" {% if row.is_active %}checked{% endif %}>
        <label class="form-check-label" for="ca">启用</label>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{{ url_for('main.sys_cap_list') }}" class="btn btn-link">返回</a>
</form>
{% endblock %}
