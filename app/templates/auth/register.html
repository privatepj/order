{% extends "base.html" %}
{% block title %}注册 - 工厂订单系统{% endblock %}
{% block page_wrapper %}
<div class="login-shell">
    <div class="login-card card border-0 shadow-lg mx-auto">
        <div class="card-header login-card-header border-0 text-center py-4">
            <div class="login-title">工厂订单系统</div>
            <p class="login-sub mb-0 mt-2">客户下单 · 送货 · 对账</p>
        </div>
        <div class="card-body p-4 p-md-5">
            <h2 class="h5 text-center mb-4 text-secondary fw-semibold">注册</h2>
            <form method="post" action="{{ url_for('auth.register') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="new-password" placeholder="请输入密码">
                </div>
                <div class="mb-4">
                    <label for="name" class="form-label">姓名</label>
                    <input type="text" class="form-control form-control-lg" id="name" name="name" autocomplete="name" placeholder="选填">
                </div>
                <div class="mb-4">
                    <label for="requested_role_id" class="form-label">申请角色 <span class="text-danger">*</span></label>
                    <select class="form-select form-select-lg" id="requested_role_id" name="requested_role_id" required>
                        <option value="">请选择要申请的角色</option>
                        {% for r in roles or [] %}
                        <option value="{{ r.id }}">{{ r.name }} ({{ r.code }})</option>
                        {% endfor %}
                    </select>
                    <div class="form-text">注册后账号将进入待审批状态，管理员审批通过后即可按所选角色使用系统。</div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">注册</button>
            </form>
            <p class="mt-3 mb-0 text-center text-secondary">
                <a href="{{ url_for('auth.login') }}">已有账号？去登录</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
