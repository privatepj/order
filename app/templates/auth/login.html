{% extends "base.html" %}
{% block title %}登录 - 工厂订单系统{% endblock %}
{% block page_wrapper %}
<div class="login-shell">
    <div class="login-card card border-0 shadow-lg mx-auto">
        <div class="card-header login-card-header border-0 text-center py-4">
            <div class="login-title">工厂订单系统</div>
            <p class="login-sub mb-0 mt-2">客户下单 · 送货 · 对账</p>
        </div>
        <div class="card-body p-4 p-md-5">
            {% block content %}
            <h2 class="h5 text-center mb-4 text-secondary fw-semibold">登录</h2>
            <form method="post" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">登录</button>
            </form>
            <p class="mt-3 mb-0 text-center text-secondary">
                <a href="{{ url_for('auth.register') }}">没有账号？去注册</a>
            </p>
            {% endblock %}
        </div>
    </div>
</div>
{% endblock %}
